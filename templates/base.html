<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>수학 오답노트</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <h1><a href="/">📝 수학 오답노트</a></h1>
    <nav>
      {% if session.username %}
        <span>{{ session.username }}님 환영합니다</span>
        <a href="/mypage">마이페이지</a>
        <a href="/add">기록 추가</a>
        <a href="/logout">로그아웃</a>
      {% else %}
        <a href="/login">로그인</a>
      {% endif %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <p>&copy; 2026 수학 오답노트</p>
  </footer>

</body>
</html>
