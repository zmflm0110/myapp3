{% extends 'base.html' %}
{% block content %}
<section class="hero">
  <h1 class="hero-title">
    <span class="accent">쉽게 만드는</span> <span class="cream">수학</span><br>
    <span class="cream">오답노트</span>
  </h1>

  <p class="hero-sub">
    틀린 문제를 <span class="key">기록</span>하고,
    <span class="key">난이도</span>와 <span class="key">이유</span>를 정리해
    나의 <span class="key">약점</span>을 추적하세요.<br>
    더 적은 노력으로, 더 빠른 성장.
  </p>

  <div class="hero-cta">
    {% if session.username %}
      <a href="/add" class="btn btn-primary">기록 추가하기</a>
    {% else %}
      <a href="/login" class="btn btn-primary">시작하기</a>
    {% endif %}
  </div>
</section>
{% endblock %}
